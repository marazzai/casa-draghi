<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Casa Draghi">
  <defs>
    <linearGradient id="ball" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c0633a"/>
      <stop offset="1" stop-color="#8a241d"/>
    </linearGradient>
  </defs>
  <!-- pallone ovale da rugby -->
  <g transform="rotate(35 60 60)">
    <ellipse cx="60" cy="60" rx="28" ry="40" fill="url(#ball)" stroke="#0c0f10" stroke-width="3.5"/>
    <line x1="60" y1="28" x2="60" y2="92" stroke="#f4efe6" stroke-width="4" stroke-linecap="round"/>
    <line x1="51" y1="42" x2="69" y2="42" stroke="#f4efe6" stroke-width="3" stroke-linecap="round"/>
    <line x1="51" y1="54" x2="69" y2="54" stroke="#f4efe6" stroke-width="3" stroke-linecap="round"/>
    <line x1="51" y1="66" x2="69" y2="66" stroke="#f4efe6" stroke-width="3" stroke-linecap="round"/>
    <line x1="51" y1="78" x2="69" y2="78" stroke="#f4efe6" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- testa di drago angolare, silhouette pulita -->
  <path fill="#0c0f10" stroke="#f4efe6" stroke-width="1.5" stroke-linejoin="round"
        d="M30 18 L58 30 L46 34 L66 40 L52 46 L72 54 Q60 60 48 56 L40 64 L42 50 L26 44 L40 38 L24 32 L40 30 Z"/>
  <!-- occhio -->
  <circle cx="44" cy="38" r="2.6" fill="#c0633a"/>
</svg>
